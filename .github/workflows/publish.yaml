name: '🚀 Publish Plugin'
on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Increment patch version
        shell: bash
        run: |
          GIT_HASH=$(git rev-parse --short HEAD)
          echo "GIT_HASH=${GIT_HASH}" >> $GITHUB_ENV

          python - <<'PY'
          import os
          import re

          path = "Directory.Build.props"
          with open(path, "r", encoding="utf-8") as file:
              content = file.read()

          match = re.search(r"<Version>(\d+)\.(\d+)\.(\d+)\.(\d+)</Version>", content)
          if not match:
              raise SystemExit("Could not parse <Version> in Directory.Build.props")

          major, minor, patch, revision = match.groups()
          new_version = f"{major}.{minor}.{int(patch) + 1}.{revision}"

          for tag in ("Version", "AssemblyVersion", "FileVersion"):
              content, count = re.subn(
                  rf"<{tag}>\d+\.\d+\.\d+\.\d+</{tag}>",
                  f"<{tag}>{new_version}</{tag}>",
                  content,
                  count=1,
              )
              if count != 1:
                  raise SystemExit(f"Could not update <{tag}> in Directory.Build.props")

          with open(path, "w", encoding="utf-8", newline="\n") as file:
              file.write(content)

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env:
              env.write(f"NEW_FILE_VERSION={new_version}\n")

          print(f"Increment patch version to {new_version}")
          PY

      - name: Check for BETA file
        id: check-beta
        run: |
          if [ -f "BETA" ]; then
            echo "IS_BETA=true" >> $GITHUB_ENV
          else
            echo "IS_BETA=false" >> $GITHUB_ENV
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Restore Beta dependencies
        if: ${{env.IS_BETA == 'true' }}
        run: |
          dotnet nuget add source --username ${{ github.repository_owner }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name jellyfin-pre "https://nuget.pkg.github.com/jellyfin/index.json"
          dotnet tool install --global dotnet-outdated-tool
          dotnet outdated -pre Always -u -inc Jellyfin

      - name: Restore dependencies
        if: ${{env.IS_BETA == 'false' }}
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Create archive
        run: zip -j "ChapterCreator-${{ env.NEW_FILE_VERSION }}.zip" ChapterCreator/bin/Release/net9.0/ChapterCreator.dll

      - name: Create new release with tag
        if: github.event_name != 'pull_request'
        run: gh release create "${{ env.NEW_FILE_VERSION }}-${{ env.GIT_HASH }}" "ChapterCreator-${{ env.NEW_FILE_VERSION }}.zip" --title "Release ${{ env.NEW_FILE_VERSION }}-${{ env.GIT_HASH }}" --latest --generate-notes --target master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated Directory.Build.props
        if: ${{ inputs.prerelease != true }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Directory.Build.props
          git commit -m "Increment patch version to ${{ env.NEW_FILE_VERSION }}"
          git push
